<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <!-- Badge background gradient -->
    <radialGradient id="bgGrad" cx="42%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>

    <!-- Globe inner glow -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <!-- Globe grid gradient (left dark → right bright → left dark, simulating sphere) -->
    <linearGradient id="gridFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#0ea5e9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Clip to globe circle -->
    <clipPath id="globeClip">
      <circle cx="150" cy="150" r="68"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <circle cx="150" cy="150" r="148" fill="url(#bgGrad)"/>
  <circle cx="150" cy="150" r="148" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.5"/>

  <!-- ── Globe soft glow ── -->
  <circle cx="150" cy="150" r="92" fill="url(#glowGrad)"/>

  <!-- ── Globe grid (clipped to globe boundary) ── -->
  <g clip-path="url(#globeClip)">
    <!-- Horizontal parallels -->
    <line x1="82" y1="116" x2="218" y2="116" stroke="url(#gridFade)" stroke-width="1.2"/>
    <line x1="82" y1="133" x2="218" y2="133" stroke="url(#gridFade)" stroke-width="0.9"/>
    <line x1="82" y1="150" x2="218" y2="150" stroke="url(#gridFade)" stroke-width="1.2"/>
    <line x1="82" y1="167" x2="218" y2="167" stroke="url(#gridFade)" stroke-width="0.9"/>
    <line x1="82" y1="184" x2="218" y2="184" stroke="url(#gridFade)" stroke-width="1.2"/>
    <!-- Vertical meridians -->
    <ellipse cx="150" cy="150" rx="34" ry="68" fill="none" stroke="#38bdf8" stroke-width="1.1" opacity="0.45"/>
    <ellipse cx="150" cy="150" rx="62" ry="68" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- ── Globe outline ── -->
  <circle cx="150" cy="150" r="70" fill="none" stroke="#38bdf8" stroke-width="2.5"/>

  <!-- ── Signal / monitoring arcs (upper half of globe) ── -->
  <!-- Center signal dot -->
  <circle cx="150" cy="150" r="3" fill="#7dd3fc" opacity="0.95"/>
  <!-- Arc 1: r=9 -->
  <path d="M 141 150 A 9 9 0 0 0 159 150"
        fill="none" stroke="#7dd3fc" stroke-width="1.8" stroke-linecap="round" opacity="0.80"/>
  <!-- Arc 2: r=17 -->
  <path d="M 133 150 A 17 17 0 0 0 167 150"
        fill="none" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <!-- Arc 3: r=25 -->
  <path d="M 125 150 A 25 25 0 0 0 175 150"
        fill="none" stroke="#7dd3fc" stroke-width="1.0" stroke-linecap="round" opacity="0.30"/>

  <!-- ── Lifecycle orbit ring (r=105, dashed) ── -->
  <circle cx="150" cy="150" r="105"
          fill="none"
          stroke="url(#orbitGrad)"
          stroke-width="1.8"
          stroke-dasharray="6 5"
          opacity="0.65"/>

  <!-- ── Orbit directional arrow (at ~195°, going clockwise = toward lower-left) ──
       Position at 195°: (150+105·cos195°, 150+105·sin195°) ≈ (49, 123)
       Clockwise tangent at 195°: (sin195°, −cos195°) ≈ (−0.259, 0.966) → down-left
  -->
  <polygon points="49,123  61,116  54,135"
           fill="#38bdf8" opacity="0.85"/>

  <!-- ── CN Probe nodes on orbit ring ──
       3 nodes equidistant (120° apart): 270° (top), 30° (lower-right), 150° (lower-left)
       r=105, center=(150,150)
       270°: (150, 45)
        30°: (241, 203)
       150°: (59, 203)
  -->

  <!-- Node 1 — top (270°) -->
  <circle cx="150" cy="45" r="9"   fill="#0a1628" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="150" cy="45" r="3.5" fill="#7dd3fc"/>
  <circle cx="150" cy="45" r="13"  fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.30"/>

  <!-- Node 2 — lower-right (30°) -->
  <circle cx="241" cy="203" r="9"   fill="#0a1628" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="241" cy="203" r="3.5" fill="#7dd3fc"/>
  <circle cx="241" cy="203" r="13"  fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.30"/>

  <!-- Node 3 — lower-left (150°) -->
  <circle cx="59" cy="203" r="9"   fill="#0a1628" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="59" cy="203" r="3.5" fill="#7dd3fc"/>
  <circle cx="59" cy="203" r="13"  fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.30"/>

  <!-- ── Thin dashed lines: probe nodes → globe edge ──
       Globe edge intersection at same angles (r=70):
       270°: (150, 80)
        30°: (211, 185)
       150°: (89, 185)
  -->
  <line x1="150" y1="54"  x2="150" y2="79"
        stroke="#38bdf8" stroke-width="1" stroke-dasharray="2 4" opacity="0.40"/>
  <line x1="234" y1="197" x2="212" y2="186"
        stroke="#38bdf8" stroke-width="1" stroke-dasharray="2 4" opacity="0.40"/>
  <line x1="66"  y1="197" x2="88"  y2="186"
        stroke="#38bdf8" stroke-width="1" stroke-dasharray="2 4" opacity="0.40"/>

</svg>
