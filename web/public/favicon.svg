<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgF" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <clipPath id="gcF">
      <circle cx="16" cy="16" r="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bgF)"/>

  <!-- Globe grid -->
  <g clip-path="url(#gcF)" opacity="0.5">
    <line x1="8" y1="12.5" x2="24" y2="12.5" stroke="#38bdf8" stroke-width="0.8"/>
    <line x1="8" y1="16"   x2="24" y2="16"   stroke="#38bdf8" stroke-width="0.8"/>
    <line x1="8" y1="19.5" x2="24" y2="19.5" stroke="#38bdf8" stroke-width="0.8"/>
    <ellipse cx="16" cy="16" rx="4" ry="8" fill="none" stroke="#38bdf8" stroke-width="0.7"/>
  </g>

  <!-- Globe outline -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#38bdf8" stroke-width="1.8"/>

  <!-- Signal dot -->
  <circle cx="16" cy="16" r="1.5" fill="#7dd3fc"/>
  <path d="M 13.5 16 A 2.5 2.5 0 0 0 18.5 16"
        fill="none" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Orbit ring -->
  <circle cx="16" cy="16" r="13"
          fill="none" stroke="#0ea5e9"
          stroke-width="1.2" stroke-dasharray="3.5 3" opacity="0.65"/>

  <!-- 3 probe nodes -->
  <circle cx="16"   cy="3"    r="2" fill="#0a1628" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="27.3" cy="22.5" r="2" fill="#0a1628" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="4.7"  cy="22.5" r="2" fill="#0a1628" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="16"   cy="3"    r="0.8" fill="#7dd3fc"/>
  <circle cx="27.3" cy="22.5" r="0.8" fill="#7dd3fc"/>
  <circle cx="4.7"  cy="22.5" r="0.8" fill="#7dd3fc"/>
</svg>
